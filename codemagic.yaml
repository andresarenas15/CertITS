workflows:
  ios-release-workflow:
    name: Compilación iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias de Flutter
        script: flutter pub get
      - name: Instalar pods de iOS
        script: |
          cd ios
          pod install
      - name: Compilar IPA para producción sin firma inicial
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa